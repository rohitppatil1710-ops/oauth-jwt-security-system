# =========================
# SERVER
# =========================
server.port=8080

# =========================
# MYSQL DATABASE
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/oauth_jwt_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =========================
# JWT CONFIGURATION
# =========================
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# =========================
# REDIS CONFIGURATION
# =========================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000

# =========================
# SWAGGER / OPENAPI
# =========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =========================
# OAUTH2 AUTHORIZATION SERVER
# =========================
spring.security.oauth2.authorizationserver.issuer=http://localhost:8080
spring.security.oauth2.authorizationserver.endpoint.authorization=/oauth2/authorize
spring.security.oauth2.authorizationserver.endpoint.token=/oauth2/token
spring.security.oauth2.authorizationserver.endpoint.token-introspection=/oauth2/introspect
spring.security.oauth2.authorizationserver.endpoint.token-revocation=/oauth2/revoke
spring.security.oauth2.authorizationserver.endpoint.jwk-set=/.well-known/jwks.json
spring.security.oauth2.authorizationserver.endpoint.oidc.user-info=/userinfo
spring.security.oauth2.authorizationserver.endpoint.oidc.client-registration=/connect/register

# OAuth2 Token Settings
spring.security.oauth2.authorizationserver.token.access-token-time-to-live=15m
spring.security.oauth2.authorizationserver.token.refresh-token-time-to-live=7d

# =========================
# OAUTH2 RESOURCE SERVER (JWT Validation)
# =========================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/.well-known/jwks.json

# =========================
# LOGGING
# =========================
logging.level.com.security=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG

# =========================
# HTTPS CONFIGURATION
# =========================
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=password123
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=tomcat

# =========================
# SECURITY HEADERS
# =========================
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict